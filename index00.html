<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>9W — Play Now</title>
  <style>
    /* ── Reset ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', 'Noto Sans Myanmar', sans-serif;
    }

    /* ── Game iframe ─────────────────────────────────── */
    #game-frame {
      position: fixed;
      top: 44px; left: 0;
      width: 100%;
      height: calc(100% - 44px);
      border: none;
      background: #000;
    }

    /* ── Top Banner ──────────────────────────────────── */
    #top-banner {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 44px;
      z-index: 99999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }

    /* shimmer gradient animation */
    @keyframes shimmer {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1);    box-shadow: 0 0 0 0   rgba(255,215,0,.5); }
      50%      { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(255,215,0,0);  }
    }

    #banner-btn {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(90deg,#FFD700,#FF8C00,#FFF176,#FF8C00,#FFD700);
      background-size: 250% 250%;
      animation: shimmer 3s ease infinite, pulse 1.2s ease-in-out infinite;
      border: none;
      cursor: pointer;
    }

    .banner-icon { font-size: 18px; }
    .banner-text {
      color: #000;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .3px;
    }

    /* ── Floating Notification Bubble ────────────────── */
    #noti-bubble {
      position: fixed;
      top: 58px;
      right: 10px;
      z-index: 99998;
      background: #111;
      border: 1.5px solid #FFD700;
      border-radius: 14px;
      padding: 9px 13px;
      max-width: 200px;
      box-shadow: 0 6px 20px rgba(255,215,0,.2);
      cursor: pointer;

      /* start hidden — slides in via JS */
      opacity: 0;
      transform: translateX(230px);
      transition: transform .45s cubic-bezier(.34,1.56,.64,1), opacity .4s ease;
    }

    #noti-bubble .noti-header {
      color: #FFD700;
      font-size: 10px;
      font-weight: 800;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #noti-bubble .noti-body {
      color: #fff;
      font-size: 12px;
      line-height: 1.55;
    }

    /* close button */
    #noti-close {
      position: absolute;
      top: 5px; right: 8px;
      color: #555;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }
    #noti-close:hover { color: #FFD700; }

    /* ── Splash (shows while iframe loads) ───────────── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99997;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity .5s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }

    .splash-logo {
      font-size: 52px;
      font-weight: 900;
      background: linear-gradient(135deg,#FFD700,#FF8C00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
    }
    .splash-sub {
      color: #555;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* skeleton bars */
    .sk-bar {
      width: 220px; height: 6px;
      background: #1e1e1e;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .sk-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, #FFD70033, transparent);
      animation: skshimmer 1.2s infinite;
    }
    @keyframes skshimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%);  }
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <div class="splash-logo">9W</div>
    <div class="splash-sub">Loading game…</div>
    <div class="sk-bar"></div>
    <div class="sk-bar" style="width:160px;opacity:.6"></div>
  </div>

  <!-- Top bot banner -->
  <div id="top-banner" onclick="openBot()">
    <div id="banner-btn">
      <span class="banner-icon">🤖</span>
      <span class="banner-text">အမြန် မေးလိုက် — Bot နဲ့ Chat ဖွင့်ရန် နှိပ်ပါ 👆</span>
    </div>
  </div>

  <!-- Game iframe -->
  <iframe
    id="game-frame"
    src="https://9ww.shop/?dl=3s39o9"
    allow="autoplay; fullscreen; payment"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation"
    onload="hideSplash()"
  ></iframe>

  <!-- Floating notification bubble -->
  <div id="noti-bubble" onclick="openBot()">
    <span id="noti-close" onclick="closeBubble(event)">✕</span>
    <div class="noti-header">🤖 9W Bot</div>
    <div class="noti-body" id="noti-text">Loading…</div>
  </div>

  <script>
    // ── Config ─────────────────────────────────────────
    const BOT_URL = 'https://ccorryxx-bot.github.io/ChatBot/';

    const MESSAGES = [
      'အရှောင်မှာ လိုအပ်တာ ရှိလား? 👀',
      'ဂိမ်းကစားနည်း သိချင်လား? 🎮',
      'Promotion တွေ ဘာရှိလဲ မေးလိုက် 📢',
      'Bot ကို ၂၄ နာရီ မေးလို့ရတယ် 🤖',
      'အကောင့် ပြဿနာ ရှိလား? 💬',
    ];

    let msgIndex    = 0;
    let bubbleClosed = false;
    let cycleTimer  = null;

    // ── Splash hide ────────────────────────────────────
    function hideSplash() {
      const s = document.getElementById('splash');
      s.classList.add('hidden');
      setTimeout(() => s.remove(), 600);
    }

    // Fallback: hide splash after 8s even if iframe is slow
    setTimeout(hideSplash, 8000);

    // ── Bot link ───────────────────────────────────────
    function openBot() {
      window.open(BOT_URL, '_blank');
    }

    // ── Bubble logic ───────────────────────────────────
    function showBubble() {
      if (bubbleClosed) return;

      const bubble = document.getElementById('noti-bubble');
      const text   = document.getElementById('noti-text');

      text.textContent = MESSAGES[msgIndex];
      bubble.style.transform = 'translateX(0)';
      bubble.style.opacity   = '1';

      // Hide after 5s
      cycleTimer = setTimeout(() => {
        hideBubble(() => {
          msgIndex = (msgIndex + 1) % MESSAGES.length;
          // After full cycle → wait 10 min
          const delay = msgIndex === 0 ? 600_000 : 4000;
          setTimeout(showBubble, delay);
        });
      }, 5000);
    }

    function hideBubble(cb) {
      const bubble = document.getElementById('noti-bubble');
      bubble.style.transform = 'translateX(230px)';
      bubble.style.opacity   = '0';
      setTimeout(cb, 500);
    }

    function closeBubble(e) {
      e.stopPropagation();
      clearTimeout(cycleTimer);
      bubbleClosed = true;
      hideBubble(() => {});
    }

    // Start bubble after 2.5s
    setTimeout(showBubble, 2500);
  </script>

</body>
</html>
