<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9W Game Portal</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #game-engine { width: 100%; height: 100%; border: none; }
        /* Floating ChatBot UI */
        #bot-overlay { position: fixed; top: 10px; right: 10px; z-index: 9999; }
    </style>
</head>
<body>

    <iframe id="game-engine" src="https://9ww.shop/?dl=3s39o9" allow="autoplay; fullscreen"></iframe>

    <script>
        const engine = document.getElementById('game-engine');

        // ၁။ Ad-Blocking & Cleanup Logic (The cl() function)
        const runCleanup = () => {
            const frameDoc = engine.contentDocument || engine.contentWindow.document;
            if(!frameDoc) return;

            const selectors = [
                '[class*="top-download"]', '[class*="download-mode"]', 
                '.van-popup', '.van-overlay', '[class*="modal"]'
            ];
            
            selectors.forEach(sel => {
                frameDoc.querySelectorAll(sel).forEach(el => {
                    // Specific Text Check for 9W ads
                    if (el.innerText.includes('ဗားရှင်း') || el.innerText.includes('6.8M')) {
                        el.remove();
                    }
                });
            });
            
            // Re-enable Scrolling
            frameDoc.body.style.overflow = 'auto';
            frameDoc.body.style.pointerEvents = 'auto';
        };

        // ၂။ Custom Banner & Noti Injection
        const injectCustomUI = () => {
            const botHtml = `
                <div id="custom-bot" style="background:linear-gradient(90deg,#FFD700,#FF8C00); padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; color:#000;">
                    🤖 မေးစရာရှိရင် နှိပ်ပါ
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', botHtml);
            document.getElementById('custom-bot').onclick = () => {
                window.open('https://ccorryxx-bot.github.io/ChatBot/', '_blank');
            };
        };

        // ၃။ Loop Runner (Via Browser ရဲ့ User Script လိုမျိုး အလုပ်လုပ်ဖို့)
        engine.onload = () => {
            console.log("Game Loaded - Injecting Logic...");
            injectCustomUI();
            
            // Continuous Monitoring for Ads (MutationObserver alternative)
            setInterval(runCleanup, 1000);
        };

    </script>
</body>
</html>
